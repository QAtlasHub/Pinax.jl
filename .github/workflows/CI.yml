name: CI
on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          # Capture the whole testset tree. The suite DUMPS it (no rendering here) and the docs build
          # renders it — which is also how a sharded run merges into ONE gallery rather than N.
          PINAX_TEST_REPORT: '1'
          PINAX_TEST_DUMP: ${{ github.workspace }}/test-report.toml
      - name: Upload the test-report dump
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pinax-test-dump-${{ matrix.version }}-${{ matrix.os }}
          path: test-report.toml
          if-no-files-found: warn
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          file: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  # Hand the test-report dump to the docs build, via a side branch — the same shape as the `media`
  # branch this repo already uses for heavy gallery inputs, and as the fleet's `ci-timings` branch.
  # An artifact cannot be used: Documentation is a SEPARATE workflow, so it cannot `needs:` this one.
  # main only: a PR must never overwrite the published report.
  publish-report:
    name: Publish test-report dump
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Collect every dump the test job produced
        uses: actions/download-artifact@v4
        with:
          pattern: pinax-test-dump-*
          path: report
          merge-multiple: false      # one dir per shard → one .toml each; the docs build merges them
      - name: Push them to the `test-report` branch
        run: |
          find report -name '*.toml' | grep -q . || { echo "no dumps — nothing to publish"; exit 0; }
          echo "${{ github.sha }}" > report/COMMIT
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tmp=$(mktemp -d) && cp -r report/. "$tmp/"
          git checkout --orphan _report
          git rm -rqf .
          cp -r "$tmp"/. .
          git add -A
          git commit -qm "test report @ ${{ github.sha }}"
          git push -f origin HEAD:test-report
